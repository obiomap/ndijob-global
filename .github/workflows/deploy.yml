name: Deploy to Railway

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'video-proxy/**'
      - '.github/**'
      - '*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy latest commit via Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          echo "RAILWAY_TOKEN length: ${#RAILWAY_TOKEN}"
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::error::RAILWAY_TOKEN secret is empty. Add a Project Token at Settings → Secrets and variables → Actions (Repository secrets, name exactly: RAILWAY_TOKEN)."
            exit 1
          fi
          npm install -g @railway/cli
          railway --version
          railway redeploy \
            --from-source \
            --yes \
            --service 9aacc5ad-d1be-48d2-b38e-03802bda4ec4 \
            --environment 98b0f563-f528-4255-aa3f-e1518b0fb00f
